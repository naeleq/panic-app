<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing - CalmNow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="screen-page">
    <div class="app-shell">
        <header class="page-header">
            <button class="back-btn" onclick="window.location.href='index.html'">←</button>
            <h2>Serenity</h2>
            <div class="placeholder"></div>
        </header>

        <main class="content center-content">
            <section class="panel breathing-panel">
                <div class="breathing-circle">
                    <span>Breathe</span>
                </div>

                <h1 class="breathing-count">Breathe in: 4</h1>
                <p class="instruction">Slowly breathe in through your nose</p>

                <div class="button-row">
                    <button class="primary-btn">Start</button>
                    <button class="secondary-btn">Reset</button>
                </div>
            </section>
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn" onclick="window.location.href='index.html'">🏠<span>Home</span></button>
            <button class="nav-btn" onclick="window.location.href='library.html'">📚<span>Library</span></button>
            <button class="nav-btn" onclick="window.location.href='emergency.html'">🚨<span>Emergency</span></button>
        </nav>
    </div>
</body>
</html>
